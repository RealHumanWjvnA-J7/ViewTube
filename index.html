<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewTube</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--border:#222;--accent:#ff3c3c;--accent2:#ff8c00;--text:#f0f0f0;--muted:#666;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}

  /* HEADER */
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(10,10,10,.97);flex-shrink:0;z-index:100;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}
  .search-row{display:flex;flex:1;max-width:520px;}
  .search-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-right:none;color:var(--text);padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;border-radius:6px 0 0 6px;outline:none;transition:border-color .2s;}
  .search-row input:focus{border-color:var(--accent);}
  .search-row input::placeholder{color:var(--muted);}
  .search-row button{background:var(--accent);border:none;color:#fff;padding:8px 16px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;border-radius:0 6px 6px 0;transition:background .2s;white-space:nowrap;}
  .search-row button:hover{background:#d42020;}
  .autoplay-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;flex-shrink:0;user-select:none;}
  .autoplay-toggle input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
  .autoplay-toggle:hover{color:var(--text);}

  /* MAIN LAYOUT — sidebar left, player right */
  .main{display:grid;grid-template-columns:360px 1fr;flex:1;min-height:0;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);min-height:0;}
  .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;flex-shrink:0;}
  .tab{padding:12px 10px;font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:var(--accent);border-color:var(--accent);}
  .sidebar-content{flex:1;overflow-y:auto;padding:10px;min-height:0;}
  .sidebar-content::-webkit-scrollbar{width:3px;}
  .sidebar-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* RESULTS */
  .result-card{display:flex;gap:9px;cursor:pointer;padding:6px;border-radius:7px;transition:background .15s;border:1px solid transparent;margin-bottom:6px;}
  .result-card:hover{background:var(--surface);border-color:var(--border);}
  .result-card.active{background:var(--surface);border-color:var(--accent);}
  .result-card.up-next{border-color:#ff8c0044;background:#1a1200;}
  .thumb{width:112px;height:63px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--border);position:relative;}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;font-family:monospace;}
  .result-info{flex:1;min-width:0;}
  .result-title{font-size:12px;font-weight:500;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .result-channel{font-size:11px;color:var(--muted);}
  .upnext-badge{font-size:9px;color:#ff8c00;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-bottom:2px;}

  /* URL PANEL */
  .url-panel{padding:14px;display:flex;flex-direction:column;gap:10px;}
  .url-panel label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .url-panel input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-size:13px;border-radius:6px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
  .url-panel input:focus{border-color:var(--accent);}
  .url-panel input::placeholder{color:var(--muted);}
  .url-panel button{background:var(--accent);border:none;color:#fff;padding:9px;border-radius:6px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;transition:background .2s;}
  .url-panel button:hover{background:#d42020;}
  .url-hints{font-size:11px;color:var(--muted);line-height:1.7;}

  /* HISTORY */
  .history-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:5px;cursor:pointer;transition:background .15s;margin-bottom:3px;}
  .history-item:hover{background:var(--surface);}
  .hdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .htitle{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .hclear{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 9px;border-radius:4px;cursor:pointer;margin-bottom:10px;transition:all .2s;font-family:'DM Sans',sans-serif;}
  .hclear:hover{border-color:var(--accent);color:var(--accent);}

  /* PLAYER SIDE */
  .player-side{display:flex;flex-direction:column;min-height:0;overflow:hidden;background:#050505;}
  .player-wrap{position:relative;width:100%;background:#000;flex-shrink:0;}
  .player-wrap iframe{width:100%;display:block;aspect-ratio:16/9;}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);aspect-ratio:16/9;}
  .placeholder .icon{font-size:48px;opacity:.2;}
  .placeholder p{font-size:13px;text-align:center;line-height:1.5;max-width:240px;}

  .video-meta{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;}
  .video-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.1;margin-bottom:6px;}
  .video-sub{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .channel-badge{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
  .open-yt{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:2px 8px;text-decoration:none;transition:all .2s;}
  .open-yt:hover{border-color:var(--accent);color:var(--accent);}
  .autoplay-countdown{font-size:12px;color:#ff8c00;background:#1a1200;border:1px solid #3a2800;border-radius:4px;padding:2px 8px;display:none;}

  /* MISC */
  .empty{text-align:center;padding:32px 12px;color:var(--muted);font-size:13px;line-height:1.6;}
  .loading{text-align:center;padding:28px;color:var(--muted);font-size:13px;}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .method-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:2px 8px;border-radius:3px;margin-bottom:8px;font-family:monospace;}
  .method-badge.direct{background:#0a1f0a;border:1px solid #1a4a1a;color:#4caf7d;}
  .method-badge.proxy{background:#1a1500;border:1px solid #3a3000;color:#ff8c00;}
  .method-badge.suggest{background:#0a0f1f;border:1px solid #1a2a4a;color:#6a9fd8;}
  .method-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
  .errbox{background:#0f0a0a;border:1px solid #3a1a1a;border-radius:8px;overflow:hidden;margin-bottom:8px;}
  .errbox-header{background:#1a0a0a;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .errbox-title{color:#ff6b6b;font-size:12px;font-weight:500;}
  .errbox-code{font-family:monospace;font-size:10px;background:#2a1010;color:#ff9090;padding:2px 7px;border-radius:3px;}
  .errbox-body{padding:12px;}
  .errbox-msg{color:#cc6666;font-size:11px;line-height:1.5;margin-bottom:10px;}
  .diag-section{margin-top:8px;}
  .diag-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
  .diag-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid #1a1a1a;font-size:10px;}
  .diag-row:last-child{border-bottom:none;}
  .diag-key{color:var(--muted);width:110px;flex-shrink:0;font-family:monospace;}
  .diag-val{color:#ccc;word-break:break-all;font-family:monospace;}
  .diag-val.ok{color:#4caf7d;}.diag-val.bad{color:#ff5555;}.diag-val.warn{color:#ff8c00;}
  .retry-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .retry-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .retry-btn:hover{border-color:var(--accent);color:var(--accent);}
  .retry-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .retry-btn.primary:hover{background:#d42020;}
  .copy-diag{font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:3px;padding:2px 7px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .2s;}
  .chip:hover{border-color:var(--accent);color:var(--text);}

  @media(max-width:750px){
    .main{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
    .sidebar{border-right:none;border-top:1px solid var(--border);max-height:45vh;}
    .player-side{order:-1;}
    header{flex-wrap:wrap;gap:8px;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">ViewTube</div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search YouTube…" autocomplete="off"/>
    <button onclick="doSearch()">SEARCH</button>
  </div>
  <label class="autoplay-toggle">
    <input type="checkbox" id="autoplayToggle" checked> Autoplay next
  </label>
</header>

<div class="main">
  <!-- SIDEBAR (left) -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" id="tab-results" onclick="switchTab('results')">RESULTS</div>
      <div class="tab" id="tab-url" onclick="switchTab('url')">DIRECT URL</div>
      <div class="tab" id="tab-history" onclick="switchTab('history')">HISTORY</div>
    </div>
    <div class="sidebar-content" id="panel-results">
      <div id="searchEmpty" class="empty">
        Search above to find videos.<br><br>
        <span style="font-size:11px;color:var(--muted)">Quick picks:</span>
        <div class="chips" id="chips"></div>
      </div>
      <div id="searchLoading" class="loading" style="display:none"><div class="spinner"></div><span id="loadingMsg">Searching…</span></div>
      <div id="resultsGrid"></div>
    </div>
    <div id="panel-url" style="display:none">
      <div class="url-panel">
        <label>YouTube URL or Video ID</label>
        <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=…"/>
        <button onclick="loadFromUrl()">LOAD VIDEO</button>
        <div class="url-hints">Supports:<br>• youtube.com/watch?v=ID<br>• youtu.be/ID<br>• youtube.com/shorts/ID<br>• Raw 11-char video ID</div>
      </div>
    </div>
    <div class="sidebar-content" id="panel-history" style="display:none">
      <div id="histEmpty" class="empty">No history yet.<br>Watch some videos!</div>
      <div id="histList"></div>
    </div>
  </div>

  <!-- PLAYER (right) -->
  <div class="player-side">
    <div class="player-wrap" id="playerWrap">
      <div class="placeholder"><div class="icon">▶</div><p>Search for a video or paste a URL to start watching</p></div>
    </div>
    <div id="videoMeta" style="display:none" class="video-meta">
      <div class="video-title" id="videoTitle"></div>
      <div class="video-sub">
        <span class="channel-badge" id="channelBadge"></span>
        <a class="open-yt" id="openYtLink" href="#" target="_blank" rel="noopener">↗ youtube.com</a>
        <span class="autoplay-countdown" id="autoplayCountdown"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let watchHistory = JSON.parse(localStorage.getItem('vt5_hist') || '[]');
let lastDiag = null;
let currentVideos = [];   // current results list
let currentIndex = -1;    // which video is playing
let countdownTimer = null;
let countdownSec = 0;

const WORKER_URL = 'https://fragrant-butterfly-475d.enderhayes82.workers.dev';
const INVIDIOUS = [
  'https://invidious.privacyredirect.com','https://inv.tux.pizza',
  'https://invidious.nerdvpn.de','https://iv.ggtyler.dev',
  'https://invidious.fdn.fr','https://yt.cdaut.de','https://invidious.io.lol',
];
const QUICK = ['Music','Minecraft','Roblox','Racing','How to','Comedy','How to cheat on tests','Intro to Html', 'Project Zomboid', 'How to build a fire in the woods', 'How to build an engine'];

// ── Init ──────────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('chips');
  QUICK.forEach(q=>{
    const el=document.createElement('div');el.className='chip';el.textContent=q;
    el.onclick=()=>{document.getElementById('searchInput').value=q;doSearch();};
    c.appendChild(el);
  });
  document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadFromUrl();});
  document.getElementById('autoplayToggle').addEventListener('change',()=>{
    if(!document.getElementById('autoplayToggle').checked) stopCountdown();
  });
})();

function switchTab(tab){
  ['results','url','history'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='history')renderHistory();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  switchTab('results');
  document.getElementById('searchEmpty').style.display='none';
  document.getElementById('searchLoading').style.display='block';
  document.getElementById('resultsGrid').innerHTML='';
  stopCountdown();

  const diag={ts:new Date().toISOString(),query:q,attempts:[],successMethod:null,videoCount:null};
  lastDiag=diag;

  setMsg('Searching…');
  let r=await tryWorker(q,diag);       if(r)return finish(r,'worker',diag);
  setMsg('Trying direct…');
  r=await tryDirect(q,diag);           if(r)return finish(r,'direct',diag);
  for(const inst of INVIDIOUS){
    setMsg('Trying fallback…');
    r=await tryInvidious(q,inst,diag); if(r)return finish(r,'invidious',diag);
  }
  setMsg('Trying suggestions…');
  r=await tryJSONP(q,diag);            if(r)return finish(r,'suggest',diag);

  document.getElementById('searchLoading').style.display='none';
  renderError(diag);
}

function setMsg(m){const e=document.getElementById('loadingMsg');if(e)e.textContent=m;}
function finish(videos,method,diag){
  diag.successMethod=method;diag.videoCount=videos.length;
  currentVideos=videos;
  document.getElementById('searchLoading').style.display='none';
  renderResults(videos,method);
}

// ── Search methods ────────────────────────────────────────────────────────────
async function tryWorker(query,diag){
  const url=`${WORKER_URL}/?q=${encodeURIComponent(query)}`;
  const a={method:'worker',url,ok:false,error:null,status:null,timing:null};
  diag.attempts.push(a);const t0=performance.now();
  try{
    const res=await fetch(url,{signal:AbortSignal.timeout(8000)});
    a.status=res.status;a.timing=ms(t0);
    if(!res.ok){a.error=`HTTP ${res.status}`;return null;}
    let data;try{data=await res.json();}catch{a.error='JSON parse fail';return null;}
    const v=parseYt(data);if(!v.length){a.error='0 results';return null;}
    a.ok=true;return v;
  }catch(e){a.error=e.message;a.timing=ms(t0);return null;}
}
async function tryDirect(query,diag){
  const a={method:'direct',url:'https://www.youtube.com/youtubei/v1/search',ok:false,error:null,status:null,timing:null};
  diag.attempts.push(a);const t0=performance.now();
  try{
    const res=await fetch(a.url,{method:'POST',headers:{'Content-Type':'application/json'},body:ytBody(query),signal:AbortSignal.timeout(8000)});
    a.status=res.status;a.timing=ms(t0);
    if(!res.ok){a.error=`HTTP ${res.status}`;return null;}
    const v=parseYt(await res.json());if(!v.length){a.error='0 results';return null;}
    a.ok=true;return v;
  }catch(e){a.error=e.message;a.timing=ms(t0);return null;}
}
async function tryInvidious(query,instance,diag){
  const url=`${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,author,videoThumbnails,lengthSeconds`;
  const a={method:'inv:'+instance.split('//')[1],url,ok:false,error:null,status:null,timing:null};
  diag.attempts.push(a);const t0=performance.now();
  try{
    const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
    a.status=res.status;a.timing=ms(t0);
    if(!res.ok){a.error=`HTTP ${res.status}`;return null;}
    const data=await res.json();
    if(!Array.isArray(data)||!data.length){a.error='0 results';return null;}
    const videos=data.slice(0,100).map(v=>({id:v.videoId,title:v.title,channel:v.author||'',thumb:`https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg`,duration:v.lengthSeconds?fmtDur(v.lengthSeconds):''}));
    a.ok=true;return videos;
  }catch(e){a.error=e.message;a.timing=ms(t0);return null;}
}
function tryJSONP(query,diag){
  return new Promise(resolve=>{
    const a={method:'jsonp',ok:false,error:null,timing:null};
    diag.attempts.push(a);const t0=performance.now();
    const cb='vt_'+Date.now();const sc=document.createElement('script');let done=false;
    const end=videos=>{
      if(done)return;done=true;a.timing=ms(t0);
      clearTimeout(timer);sc.remove();delete window[cb];
      if(videos?.length){a.ok=true;resolve(videos);}
      else{a.error=videos?'No IDs':'Blocked';resolve(null);}
    };
    window[cb]=data=>{
      const videos=[];
      for(const s of(data[1]||[])){
        const meta=s[3];const id=meta?.zi?.vi||meta?.zz?.vi;
        if(id)videos.push({id,title:meta?.zi?.t||s[0]||'Untitled',channel:'',thumb:`https://i.ytimg.com/vi/${id}/mqdefault.jpg`,duration:''});
      }
      end(videos.length?videos:null);
    };
    const timer=setTimeout(()=>end(null),6000);
    sc.onerror=()=>{a.error='Script blocked';end(null);};
    sc.src=`https://suggestqueries-clients6.youtube.com/complete/search?client=youtube&gl=us&hl=en&q=${encodeURIComponent(query)}&callback=${cb}&ds=yt`;
    document.head.appendChild(sc);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function ytBody(q){return JSON.stringify({query:q,context:{client:{clientName:'WEB',clientVersion:'2.20240101.00.00',hl:'en',gl:'US'}}});}
function parseYt(data){
  const videos=[];
  const secs=data?.contents?.twoColumnSearchResultsRenderer?.primaryContents?.sectionListRenderer?.contents||[];
  for(const sec of secs){
    for(const item of(sec?.itemSectionRenderer?.contents||[])){
      const vr=item?.videoRenderer;if(!vr?.videoId)continue;
      videos.push({id:vr.videoId,title:vr.title?.runs?.[0]?.text||'Untitled',channel:vr.ownerText?.runs?.[0]?.text||'',thumb:`https://i.ytimg.com/vi/${vr.videoId}/mqdefault.jpg`,duration:vr.lengthText?.simpleText||''});
      if(videos.length>=100)return videos;
    }
  }
  return videos;
}
function ms(t0){return Math.round(performance.now()-t0);}
function fmtDur(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}

// ── Render results ────────────────────────────────────────────────────────────
function renderResults(videos,method){
  const grid=document.getElementById('resultsGrid');
  grid.innerHTML='';
  const labels={worker:'Search proxy · YouTube',direct:'Direct · YouTube',invidious:'Invidious',suggest:'Suggestions (limited)'};
  const cls=method==='worker'||method==='direct'?'direct':method==='suggest'?'suggest':'proxy';
  const badge=document.createElement('div');
  badge.className=`method-badge ${cls}`;
  badge.innerHTML=`<span class="method-dot"></span>${labels[method]||method} · ${videos.length} results`;
  grid.appendChild(badge);
  videos.forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='result-card';card.id=`card-${i}`;
    card.innerHTML=`
      <div class="thumb">
        <img src="${esc(v.thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">
        ${v.duration?`<span class="thumb-dur">${esc(v.duration)}</span>`:''}
      </div>
      <div class="result-info">
        <div class="result-title">${esc(v.title)}</div>
        <div class="result-channel">${esc(v.channel)}</div>
      </div>`;
    card.onclick=()=>loadVideo(i);
    grid.appendChild(card);
  });
}

// ── Player ────────────────────────────────────────────────────────────────────
function loadVideo(index){
  stopCountdown();
  if(index<0||index>=currentVideos.length)return;
  currentIndex=index;
  const v=currentVideos[index];

  // highlight active card, mark next
  document.querySelectorAll('.result-card').forEach((c,i)=>{
    c.classList.remove('active','up-next');
    c.querySelector('.upnext-badge')?.remove();
  });
  const activeCard=document.getElementById(`card-${index}`);
  if(activeCard){
    activeCard.classList.add('active');
    activeCard.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
  const nextCard=document.getElementById(`card-${index+1}`);
  if(nextCard&&document.getElementById('autoplayToggle').checked){
    nextCard.classList.add('up-next');
    const nb=document.createElement('div');nb.className='upnext-badge';nb.textContent='UP NEXT';
    nextCard.querySelector('.result-info').prepend(nb);
  }

  document.getElementById('playerWrap').innerHTML=`<iframe
    src="https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
    allowfullscreen title="${esc(v.title)}"></iframe>`;

  document.getElementById('videoMeta').style.display='block';
  document.getElementById('videoTitle').textContent=v.title;
  document.getElementById('channelBadge').textContent=v.channel||v.id;
  document.getElementById('openYtLink').href=`https://www.youtube.com/watch?v=${v.id}`;
  addHistory(v.id,v.title,v.channel);

  // Start autoplay countdown if there's a next video
  if(document.getElementById('autoplayToggle').checked&&index+1<currentVideos.length){
    startCountdown(index+1);
  }
}

function loadFromUrl(){
  const raw=document.getElementById('urlInput').value.trim();
  const id=extractId(raw);if(!id){alert('Could not extract a video ID.');return;}
  // inject as a standalone video
  currentVideos=[{id,title:'Video — '+id,channel:'',thumb:'',duration:''}];
  currentIndex=0;
  loadVideo(0);
  switchTab('results');
}

function extractId(s){
  if(/^[a-zA-Z0-9_-]{11}$/.test(s))return s;
  const pats=[/[?&]v=([a-zA-Z0-9_-]{11})/,/youtu\.be\/([a-zA-Z0-9_-]{11})/,/\/shorts\/([a-zA-Z0-9_-]{11})/,/\/embed\/([a-zA-Z0-9_-]{11})/];
  for(const p of pats){const m=s.match(p);if(m)return m[1];}return null;
}

// ── Autoplay countdown ────────────────────────────────────────────────────────
function startCountdown(nextIndex){
  countdownSec=10;
  const el=document.getElementById('autoplayCountdown');
  el.style.display='inline-block';
  el.textContent=`Next in ${countdownSec}s`;
  countdownTimer=setInterval(()=>{
    countdownSec--;
    if(countdownSec<=0){
      stopCountdown();
      loadVideo(nextIndex);
    }else{
      el.textContent=`Next in ${countdownSec}s`;
    }
  },1000);
}
function stopCountdown(){
  clearInterval(countdownTimer);countdownTimer=null;
  const el=document.getElementById('autoplayCountdown');
  if(el)el.style.display='none';
}

// ── History ───────────────────────────────────────────────────────────────────
function addHistory(id,title,channel){
  watchHistory=watchHistory.filter(h=>h.id!==id);
  watchHistory.unshift({id,title,channel});
  if(watchHistory.length>60)watchHistory=watchHistory.slice(0,60);
  localStorage.setItem('vt5_hist',JSON.stringify(watchHistory));
}
function renderHistory(){
  const list=document.getElementById('histList'),empty=document.getElementById('histEmpty');
  list.innerHTML='';
  if(!watchHistory.length){empty.style.display='block';return;}
  empty.style.display='none';
  const clr=document.createElement('button');clr.className='hclear';clr.textContent='Clear history';
  clr.onclick=()=>{watchHistory=[];localStorage.removeItem('vt5_hist');renderHistory();};list.appendChild(clr);
  watchHistory.forEach(h=>{
    const el=document.createElement('div');el.className='history-item';
    el.innerHTML=`<div class="hdot"></div><div class="htitle">${esc(h.title)}</div>`;
    el.onclick=()=>{
      currentVideos=[h];currentIndex=0;loadVideo(0);switchTab('results');
    };
    list.appendChild(el);
  });
}

// ── Error renderer ────────────────────────────────────────────────────────────
function renderError(diag){
  const grid=document.getElementById('resultsGrid');grid.innerHTML='';
  const box=document.createElement('div');box.className='errbox';
  box.innerHTML=`
    <div class="errbox-header">
      <span class="errbox-title">⚠ All methods failed</span>
      <span class="errbox-code">ERR_ALL_EXHAUSTED</span>
      <button class="copy-diag" onclick="copyDiag()">Copy debug info</button>
    </div>
    <div class="errbox-body">
      <div class="errbox-msg">Worker may be down — check workers.cloudflare.com.</div>
      <div class="diag-section">
        <div class="diag-label">Attempt log</div>
        ${diag.attempts.map(a=>`<div class="diag-row"><span class="diag-key">${esc(a.method)}</span><span class="diag-val ${a.ok?'ok':'bad'}">${a.ok?'✓':'✗ '+esc(a.error||'?')} ${a.status?'['+a.status+']':''} ${a.timing!=null?'('+a.timing+'ms)':''}</span></div>`).join('')}
      </div>
      <div class="retry-row">
        <button class="retry-btn primary" onclick="doSearch()">↺ Retry</button>
        <button class="retry-btn" onclick="switchTab('url')">▶ Paste URL</button>
      </div>
    </div>`;
  grid.appendChild(box);
}
function copyDiag(){
  if(!lastDiag)return;
  const t=JSON.stringify(lastDiag,null,2);
  navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('.copy-diag');if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy debug info',2000);}}).catch(()=>prompt('Copy:',t));
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
